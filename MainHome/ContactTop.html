<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Top</title>
  <style>
    :root {
      --bg: #020617;
      --surface: #0f172a;
      --text: #ffffff;
      --muted: #94a3b8;
      --brand: #38bdf8;
    }

    .pr-contact-top,
    .pr-contact-top * {
      box-sizing: border-box;
      font-family: Arial, sans-serif !important;
    }

    body {
      margin: 0;
      background: var(--bg);
    }

    .pr-contact-top {
      width: 100%;
      background: var(--bg);
      color: var(--text);
    }

    .pr-contact-top .content-inner {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 28px 18px;
    }

    .pr-contact-top section {
      position: relative;
    }

    .pr-contact-top .hero-home {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      padding: 0;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.78);
      color: #f8fafc !important;
      backdrop-filter: blur(8px);
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .pr-contact-top .hero-home:hover {
      background: rgba(37, 99, 235, 0.88);
      transform: translateY(-1px);
    }

    .pr-contact-top .hero-home svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
    }

    .pr-contact-top .section-head {
      max-width: 900px;
      padding: 0 0 18px 24px;
      border-left: 4px solid rgba(56, 189, 248, 0.78);
    }

    .pr-contact-top .section-kicker {
      display: inline-flex;
      align-items: center;
      margin: 0 0 16px;
      color: #7dd3fc;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .pr-contact-top .section-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .pr-contact-top .section-head h2 {
      margin: 0;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .pr-contact-top .section-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.48);
      color: #e2e8f0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .pr-contact-top .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .pr-contact-top .imweb-form-slot {
      min-height: 520px;
      border: 1px dashed rgba(56, 189, 248, 0.34);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(8, 17, 33, 0.92), rgba(11, 20, 39, 0.96));
      padding: 26px;
    }

    .pr-contact-top .slot-guide {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .pr-contact-top .slot-guide h3 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .pr-contact-top .slot-guide p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
    }

    .pr-contact-top .slot-steps {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .pr-contact-top .slot-step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.5);
    }

    .pr-contact-top .slot-step strong {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.16);
      color: #7dd3fc;
      font-size: 13px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .pr-contact-top .slot-step span {
      color: #e2e8f0;
      font-size: 14px;
      line-height: 1.6;
    }

    .pr-contact-top input,
    .pr-contact-top textarea,
    .pr-contact-top select {
      background: #081121 !important;
      color: #ffffff !important;
      border: 1px solid rgba(148, 163, 184, 0.22) !important;
    }

    .pr-contact-top input::placeholder,
    .pr-contact-top textarea::placeholder {
      color: #64748b !important;
    }

    .pr-contact-top label,
    .pr-contact-top .form_label,
    .pr-contact-top .control-label,
    .pr-contact-top .label {
      color: #f8fafc !important;
    }

    .pr-contact-top button,
    .pr-contact-top input[type="submit"],
    .pr-contact-top .btn {
      background: #2563eb !important;
      color: #ffffff !important;
      border: none !important;
    }

    @media (max-width: 760px) {
      .pr-contact-top .hero-home {
        position: static;
        margin-bottom: 18px;
      }

      .pr-contact-top .content-inner {
        padding: 24px 18px 18px;
      }

      .pr-contact-top .section-head {
        padding-left: 18px;
      }

      .pr-contact-top .section-head h2 {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>
  <div class="pr-contact-top">
    <div class="content-inner">
      <section>
        <a class="hero-home" href="/" aria-label="홈으로">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 10.5 12 3l9 7.5"></path>
            <path d="M5.5 9.5V21h13V9.5"></path>
            <path d="M10 21v-6h4v6"></path>
          </svg>
        </a>
        <div class="section-head">
          <!-- <div class="section-kicker">Contact Inquiry</div> -->
          <div class="section-title-row">
            <h2>Contact Us</h2>
          </div>
          <p>상담이 필요하시면 아래 문의 폼을 작성해주세요. 업무시간 내 순차적으로 연결해드립니다.</p>
        </div>
      </section>
    </div>
  </div>
</body>

</html>
