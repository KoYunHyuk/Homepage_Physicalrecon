<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Bottom</title>
  <style>
    :root {
      --bg: #020617;
      --surface: #0f172a;
      --surface-soft: #18233d;
      --text: #ffffff;
      --muted: #94a3b8;
      --brand: #38bdf8;
      --line: rgba(148, 163, 184, 0.18);
    }

    .pr-contact-bottom,
    .pr-contact-bottom * {
      box-sizing: border-box;
      font-family: Arial, sans-serif !important;
    }

    body {
      margin: 0;
      background: var(--bg);
    }

    .pr-contact-bottom {
      width: 100%;
      background: var(--bg);
      color: var(--text);
    }

    .pr-contact-bottom .content-inner {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px 28px 0;
    }

    .pr-contact-bottom .contact-stack {
      display: grid;
      gap: 18px;
      padding-bottom: 18px;
    }

    .pr-contact-bottom .contact-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface-soft) 100%);
      padding: 24px;
    }

    .pr-contact-bottom .contact-kicker {
      display: inline-flex;
      align-items: center;
      margin-bottom: 14px;
      color: #7dd3fc;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .pr-contact-bottom .contact-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .pr-contact-bottom .contact-card h3 {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .pr-contact-bottom .contact-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.48);
      color: #e2e8f0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .pr-contact-bottom .contact-card p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
    }

    .pr-contact-bottom .contact-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .pr-contact-bottom .contact-meta-item {
      padding: 16px 18px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 16px;
      background: rgba(8, 17, 33, 0.42);
    }

    .pr-contact-bottom .contact-meta-item strong {
      display: block;
      margin-bottom: 6px;
      color: var(--brand);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .pr-contact-bottom .contact-meta-item span {
      color: #f8fafc;
      font-size: 16px;
      line-height: 1.6;
    }

    .pr-contact-bottom .contact-note {
      padding-left: 20px;
      border-left: 4px solid rgba(56, 189, 248, 0.72);
    }

    @media (max-width: 760px) {
      .pr-contact-bottom .content-inner {
        padding: 18px 18px 0;
      }

      .pr-contact-bottom .contact-card h3 {
        font-size: 26px;
      }

      .pr-contact-bottom .contact-meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="pr-contact-bottom">
    <div class="content-inner">
      <aside class="contact-stack">
        <div class="contact-card">
          <div class="contact-kicker">Direct Contact</div>
          <div class="contact-title-row">
            <h3>전화 문의</h3>
          </div>
          <p>빠른 상담이 필요하시면 아래 연락처로 문의해주세요. 업무시간 내 순차적으로 연결해드립니다.</p>
          <div class="contact-meta">
            <div class="contact-meta-item">
              <strong>대표 연락처</strong>
              <span>031-698-2076</span>
            </div>
            <div class="contact-meta-item">
              <strong>이메일</strong>
              <span>shlee@physicalrecon.com</span>
            </div>
            <div class="contact-meta-item">
              <strong>업무시간</strong>
              <span>평일 09:00 - 18:00</span>
            </div>
          </div>
        </div>

        <div class="contact-card">
          <div class="contact-note">
            <h3>안내 사항</h3>
            <p>보내주신 문의 내용은 검토 후 담당 부서에서 회신드립니다. 긴급한 문의는 전화 상담을 우선 이용해주세요.</p>
          </div>
        </div>
      </aside>
    </div>
  </div>
</body>
</html>
